services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: zorvyn-server
    environment:
      PORT: "3000"
      DB_PATH: /data/finance.sqlite
      JWT_SECRET: dev-local-secret
      JWT_EXPIRES_IN: 12h
    ports:
      - "3000:3000"
    volumes:
      - server_data:/data
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
    container_name: zorvyn-web
    environment:
      PORT: "3000"
    ports:
      - "3001:3000"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  server_data:
